<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Нажимай и играй</title>

<meta property="og:title"        content="👉 НАЖИМАЙ И ИГРАЙ! 🚀" />
<meta property="og:description"  content="НАЖИМАЙ И ИГРАЙ" />
<meta property="og:image"        content="https://yalica.github.io/uzimuzi-web-1/cover.png" />
<meta property="og:image:width"  content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:url"          content="https://yalica.github.io/uzimuzi-web-1/" />
<meta property="og:type"         content="website" />
<meta name="twitter:card"        content="summary_large_image" />
<meta name="twitter:image"       content="https://yalica.github.io/uzimuzi-web-1/cover.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        background-color: #000000; user-select: none; -webkit-user-select: none;
        -ms-user-select: none; -moz-user-select: none; font-family: sans-serif;
        touch-action: none;
    }

    .phone-frame {
        width: 100%; height: 100%; position: relative;
        background-color: #000000;
    }
    @media (min-width: 600px) and (pointer: fine) {
        body { display: flex; justify-content: center; align-items: center; background: #111; }
        .phone-frame {
            width: auto; height: 92vh; aspect-ratio: 9/16;
            border: 12px solid #1a1a1a; border-radius: 40px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8); overflow: hidden;
        }
    }

    .swiper-container {
        display: flex; width: 300%; height: 100%;
        transition: transform 0.3s ease-out;
    }
    .page {
        width: 33.3333%; height: 100%; display: flex;
        justify-content: center; align-items: center;
        background-color: #000000; position: relative;
    }
    .page img, .page video {
        height: 100%; width: 100%; object-fit: contain;
        display: block; pointer-events: none; -webkit-user-drag: none;
    }

    .hint-badge {
        position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: #fff;
        padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: bold;
        text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.4);
        pointer-events: none; z-index: 5; animation: pulseBlink 2s infinite ease-in-out;
    }
    @keyframes pulseBlink {
        0% { opacity: 0.3; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.3; transform: scale(0.95); }
    }

    .play-pause-badge {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(255,215,0,0.9); color: #000;
        padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: bold;
        text-transform: uppercase; letter-spacing: 1px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        pointer-events: none; z-index: 5;
    }

    .share-badge {
        position: absolute; top: 20px; right: 20px;
        background: rgba(0,0,0,0.7); color: #fff;
        padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: bold;
        text-transform: uppercase; letter-spacing: 1px;
        border: 1px solid rgba(255,255,255,0.4);
        z-index: 10; cursor: pointer;
        display: flex; align-items: center; gap: 6px;
    }
    .share-badge:active { transform: scale(0.95); }

    /* ===== ФИРМЕННАЯ ПЛАШКА YA.LI.CA. ===== */
    .brand-plate {
        position: absolute;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        width: 88%;
        max-width: 520px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(212, 175, 55, 0.45);
        border-radius: 16px;
        padding: 16px 20px;
        z-index: 8;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s ease, transform 0.8s ease;
        text-align: center;
    }
    .brand-plate.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
    }
    .brand-plate .brand-text {
        font-family: 'Playfair Display', 'Times New Roman', Georgia, serif;
        color: #f5f0e6;
        font-size: 15px;
        line-height: 1.5;
        letter-spacing: 0.3px;
    }
    .brand-plate .brand-name {
        color: #d4af37;
        font-weight: 600;
        font-style: italic;
        letter-spacing: 1px;
    }
    .brand-links {
        margin-top: 12px;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
    }
    .brand-links a {
        font-family: 'Playfair Display', Georgia, serif;
        color: #d4af37;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid rgba(212, 175, 55, 0.5);
        border-radius: 20px;
        padding: 6px 16px;
        transition: all 0.25s ease;
    }
    .brand-links a:active,
    .brand-links a:hover {
        background: rgba(212, 175, 55, 0.9);
        color: #000;
    }
</style>
</head>
<body oncontextmenu="return false;">

    <div class="phone-frame">
        <div class="swiper-container" id="swiper">

            <div class="page" id="page1">
                <div class="hint-badge">Листай влево ➔</div>
                <img id="img1" alt="Экран 1">
            </div>

            <div class="page" id="page2">
                <div class="hint-badge">Листай влево ➔</div>
                <img id="img2" alt="Правила">
            </div>

            <div class="page" id="page3">
                <div class="share-badge" id="shareBadge"> Поделиться</div>

                <!-- ===== ФИРМЕННАЯ ПЛАШКА ===== -->
                <div class="brand-plate" id="brandPlate">
                    <div class="brand-text">
                        Разработано на базе маркетинговой архитектуры
                        <span class="brand-name">YA.LI.CA.</span>
                        (Yield. Leads. Catch.):<br>
                        умный захват лидов и генерация прибыли.
                    </div>

                    <!-- ССЫЛКИ ДОБАВИШЬ ПОТОМ СЮДА:
                    <div class="brand-links">
                        <a href="https://t.me/твой_ник" target="_blank">Telegram</a>
                        <a href="https://твой-сайт.ru" target="_blank">Сайт</a>
                    </div>
                    -->
                </div>

                <div class="play-pause-badge" id="ppBadge">🔘 ВПЕРЁД</div>
                <video id="gameVideo" playsinline preload="auto"
                       controlslist="nodownload nofullscreen noremoteplayback">
                    <source id="videoSrc" type="video/mp4">
                </video>
            </div>

        </div>
    </div>

    <script>
        const _0x1a = ['cm91bmRlZC5wbmc=', 'cnVsZXMucG5n', 'Z2FtZS5tcDQ='];
        const decode = (str) => atob(str);

        const video = document.getElementById('gameVideo');
        const swiper = document.getElementById('swiper');
        const ppBadge = document.getElementById('ppBadge');
        const shareBadge = document.getElementById('shareBadge');
        const brandPlate = document.getElementById('brandPlate');
        let currentPage = 0;

        document.getElementById('img1').src = decode(_0x1a[0]);
        document.getElementById('img2').src = decode(_0x1a[1]);
        document.getElementById('videoSrc').src = decode(_0x1a[2]);

        window.addEventListener('load', () => { video.load(); });

        function changePage(pageIndex) {
            currentPage = pageIndex;
            swiper.style.transform = `translateX(-${currentPage * 33.3333}%)`;
            if (currentPage === 2) {
                video.play().then(() => { ppBadge.textContent = '🔘 СТОП'; }).catch(() => {});
            } else {
                video.pause();
                ppBadge.textContent = '🔘 ВПЕРЁД';
                brandPlate.classList.remove('show');
            }
        }

        document.getElementById('page1').addEventListener('click', () => changePage(1));
        document.getElementById('page2').addEventListener('click', () => changePage(2));
        document.getElementById('page3').addEventListener('click', () => {
            if (video.paused) {
                if (video.ended || video.currentTime >= video.duration - 0.1) {
                    video.currentTime = 0;
                    brandPlate.classList.remove('show');
                }
                video.play().then(() => { ppBadge.textContent = '🔘 СТОП'; }).catch(() => {});
            } else {
                video.pause();
                ppBadge.textContent = '🔘 ВПЕРЁД';
            }
        });

        // Плашка появляется за 3 секунды до конца
        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            const timeLeft = video.duration - video.currentTime;
            if (timeLeft <= 3 && timeLeft > 0) {
                brandPlate.classList.add('show');
            }
        });

        video.addEventListener('ended', () => {
            ppBadge.textContent = '🔘 ВПЕРЁД';
            brandPlate.classList.add('show');
        });

        shareBadge.addEventListener('click', async (e) => {
            e.stopPropagation();
            const shareData = {
                title: 'НАЖИМАЙ И ИГРАЙ! 🚀',
                text: 'Смотри, попробуй! 👉',
                url: 'https://yalica.github.io/uzimuzi-web-1/'
            };
            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(shareData.url);
                    alert('Ссылка скопирована! 📋');
                }
            } catch (err) {}
        });

        let startX = 0;
        document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            let diffX = startX - e.changedTouches[0].clientX;
            if (diffX > 60 && currentPage < 2) changePage(currentPage + 1);
            if (diffX < -60 && currentPage > 0) changePage(currentPage - 1);
        });

        document.addEventListener('keydown', function(e) {
            if (
                e.keyCode === 123 ||
                (e.ctrlKey && e.shiftKey && [73,74,67].includes(e.keyCode)) ||
                (e.ctrlKey && e.keyCode === 85) ||
                (e.ctrlKey && e.keyCode === 83)
            ) { e.preventDefault(); return false; }
        });
        window.addEventListener('contextmenu', (e) => e.preventDefault(), false);
        document.addEventListener('dragstart', (e) => e.preventDefault(), false);
    </script>

</body>
</html>
