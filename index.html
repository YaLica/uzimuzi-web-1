<style>
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        background-color: #000000; user-select: none; -webkit-user-select: none;
        -ms-user-select: none; -moz-user-select: none; font-family: sans-serif;
        touch-action: none;
    }

    .phone-frame {
        width: 100%; height: 100%; position: relative;
        background-color: #000000;
    }
    @media (min-width: 600px) and (pointer: fine) {
        body { display: flex; justify-content: center; align-items: center; background: #111; }
        .phone-frame {
            width: auto; height: 92vh; aspect-ratio: 9/16;
            border: 12px solid #1a1a1a; border-radius: 40px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8); overflow: hidden;
        }
    }

    .swiper-container {
        display: flex; width: 300%; height: 100%;
        transition: transform 0.3s ease-out;
    }
    .page {
        width: 33.3333%; height: 100%; display: flex;
        justify-content: center; align-items: center;
        background-color: #000000; position: relative;
    }
    .page img, .page video {
        height: 100%; width: 100%; object-fit: contain;
        display: block; pointer-events: none; -webkit-user-drag: none;
    }

    .hint-badge {
        position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: #fff;
        padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: bold;
        text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.4);
        pointer-events: none; z-index: 5; animation: pulseBlink 2s infinite ease-in-out;
    }
    @keyframes pulseBlink {
        0% { opacity: 0.3; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.3; transform: scale(0.95); }
    }

    .play-pause-badge {
        position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(255,215,0,0.9); color: #000;
        padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: bold;
        text-transform: uppercase; letter-spacing: 1px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        pointer-events: none; z-index: 5;
    }

    .share-badge {
        position: absolute; top: 20px; right: 20px;
        background: rgba(0,0,0,0.7); color: #fff;
        padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: bold;
        text-transform: uppercase; letter-spacing: 1px;
        border: 1px solid rgba(255,255,255,0.4);
        z-index: 10; cursor: pointer;
        display: flex; align-items: center; gap: 6px;
    }
    .share-badge:active { transform: scale(0.95); }

    /* ===== КНОПКИ ССЫЛОК (СВЕРХУ ПО ЦЕНТРУ) ===== */
    .brand-links {
        position: absolute;
        top: 60px;
        left: 50%;
        transform: translateX(-50%) translateY(-15px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 8;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .brand-links.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
    }
    .brand-links a {
        font-family: 'Playfair Display', Georgia, serif;
        color: #d4af37;
        text-decoration: none;
        font-size: 15px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(212, 175, 55, 0.7);
        border-radius: 26px;
        padding: 11px 24px;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        white-space: nowrap;
    }
    .brand-links a svg { width: 18px; height: 18px; display: block; }
    .brand-links a .max-logo {
        font-weight: 800;
        font-family: Arial, sans-serif;
        font-size: 15px;
        letter-spacing: 0.5px;
    }
    .brand-links a:active,
    .brand-links a:hover {
        background: rgba(212, 175, 55, 0.95);
        color: #000;
    }
    .brand-links a:active svg path,
    .brand-links a:hover svg path { fill: #000; }
    .brand-links a:active .max-logo,
    .brand-links a:hover .max-logo { color: #000; }

    /* ===== ВЕРТИКАЛЬНЫЙ ПРОГРЕСС-БАР ===== */
    .progress-vertical {
        position: absolute;
        top: 0;
        left: 0;
        width: 6px;
        height: 100%;
        background: rgba(255,255,255,0.15);
        z-index: 9;
        pointer-events: none;
    }
    .progress-vertical-fill {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 0%;
        background: #d4af37;
        box-shadow: 0 0 8px rgba(212,175,55,0.8);
    }
</style>

<body oncontextmenu="return false;">

    <div class="phone-frame">
        <div class="swiper-container" id="swiper">

            <div class="page" id="page1">
                <div class="hint-badge">Листай влево ➔</div>
                <img id="img1" alt="Экран 1">
            </div>

            <div class="page" id="page2">
                <div class="hint-badge">Листай влево ➔</div>
                <img id="img2" alt="Правила">
            </div>

            <div class="page" id="page3">
                <div class="share-badge" id="shareBadge"> Поделиться</div>

                <!-- ===== ВЕРТИКАЛЬНЫЙ ПРОГРЕСС-БАР ===== -->
                <div class="progress-vertical">
                    <div class="progress-vertical-fill" id="progressFill"></div>
                </div>

                <!-- ===== КНОПКИ ССЫЛОК ===== -->
                <div class="brand-links" id="brandLinks">
                    <a href="https://t.me/yalica_arch" target="_blank" rel="noopener">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#d4af37" d="M23.91 3.79L20.3 20.84c-.25 1.21-.98 1.5-2 .94l-5.5-4.07-2.66 2.57c-.3.3-.55.56-1.1.56l.39-5.56 10.12-9.14c.44-.39-.1-.61-.68-.22L6.32 13.4l-5.45-1.7c-1.18-.37-1.2-1.18.25-1.75l21.3-8.21c.99-.36 1.85.22 1.49 1.85z"/>
                        </svg>
                        Узнать больше в Telegram
                    </a>
                    <a href="https://max.ru/join/SHeDSkc09AkDRydwJrMw3pe-C46C1Za9g0erHNvG1Ys" target="_blank" rel="noopener">
                        <span class="max-logo">MAX</span>
                        Узнать больше в МАХ
                    </a>
                </div>

                <div class="play-pause-badge" id="ppBadge"> ВПЕРЁД</div>
                <video id="gameVideo" playsinline preload="auto"
                       controlslist="nodownload nofullscreen noremoteplayback">
                    <source id="videoSrc" type="video/mp4">
                </video>
            </div>

        </div>
    </div>

    <script>
        const _0x1a = ['cm91bmRlZC5wbmc=', 'cnVsZXMucG5n', 'Z2FtZS5tcDQ='];
        const decode = (str) => atob(str);

        const video = document.getElementById('gameVideo');
        const swiper = document.getElementById('swiper');
        const ppBadge = document.getElementById('ppBadge');
        const shareBadge = document.getElementById('shareBadge');
        const brandLinks = document.getElementById('brandLinks');
        const progressFill = document.getElementById('progressFill');
        let currentPage = 0;

        document.getElementById('img1').src = decode(_0x1a[0]);
        document.getElementById('img2').src = decode(_0x1a[1]);
        document.getElementById('videoSrc').src = decode(_0x1a[2]);

        window.addEventListener('load', () => { video.load(); });

        function changePage(pageIndex) {
            currentPage = pageIndex;
            swiper.style.transform = `translateX(-${currentPage * 33.3333}%)`;
            if (currentPage === 2) {
                video.play().then(() => { ppBadge.textContent = ' СТОП'; }).catch(() => {});
            } else {
                video.pause();
                ppBadge.textContent = ' ВПЕРЁД';
                brandLinks.classList.remove('show');
            }
        }

        document.getElementById('page1').addEventListener('click', () => changePage(1));
        document.getElementById('page2').addEventListener('click', () => changePage(2));
        document.getElementById('page3').addEventListener('click', () => {
            if (video.paused) {
                if (video.ended || video.currentTime >= video.duration - 0.1) {
                    video.currentTime = 0;
                    brandLinks.classList.remove('show');
                }
                video.play().then(() => { ppBadge.textContent = ' СТОП'; }).catch(() => {});
            } else {
                video.pause();
                ppBadge.textContent = ' ВПЕРЁД';
            }
        });

        // Клики по ссылкам НЕ переключают видео
        document.querySelectorAll('.brand-links a').forEach(link => {
            link.addEventListener('click', (e) => e.stopPropagation());
        });

        // Прогресс-бар + кнопки появляются за 3 секунды до конца
        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;

            // Прогресс-бар на 78 секунд (1:18), опускается сверху вниз
            const percent = Math.min((video.currentTime / 78) * 100, 100);
            progressFill.style.height = percent + '%';

            const timeLeft = video.duration - video.currentTime;
            if (timeLeft <= 3 && timeLeft > 0) {
                brandLinks.classList.add('show');
            }
        });

        video.addEventListener('ended', () => {
            ppBadge.textContent = ' ВПЕРЁД';
            brandLinks.classList.add('show');
            progressFill.style.height = '100%';
        });

        // === ВОЗВРАТ ИЗ КАНАЛА: не запускаем видео заново, оставляем кнопки ===
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && currentPage === 2) {
                video.pause();
                ppBadge.textContent = ' ВПЕРЁД';
                brandLinks.classList.add('show');
            }
        });

        shareBadge.addEventListener('click', async (e) => {
            e.stopPropagation();
            const shareData = {
                title: 'НАЖИМАЙ И ИГРАЙ! 🚀',
                text: 'Смотри, попробуй! 👉',
                url: 'https://yalica.github.io/uzimuzi-web-1/'
            };
            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(shareData.url);
                    alert('Ссылка скопирована! 📋');
                }
            } catch (err) {}
        });

        let startX = 0;
        document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive: true});
        document.addEventListener('touchend', (e) => {
            let diffX = startX - e.changedTouches[0].clientX;
            if (diffX > 60 && currentPage < 2) changePage(currentPage + 1);
            if (diffX < -60 && currentPage > 0) changePage(currentPage - 1);
        });

        document.addEventListener('keydown', function(e) {
            if (
                e.keyCode === 123 ||
                (e.ctrlKey && e.shiftKey && [73,74,67].includes(e.keyCode)) ||
                (e.ctrlKey && e.keyCode === 85) ||
                (e.ctrlKey && e.keyCode === 83)
            ) { e.preventDefault(); return false; }
        });
        window.addEventListener('contextmenu', (e) => e.preventDefault(), false);
        document.addEventListener('dragstart', (e) => e.preventDefault(), false);
    </script>
